sonar.projectKey=shreegovinda_financeanalytics
sonar.projectName=Finance Analytics
sonar.projectVersion=1.0.0
sonar.sources=backend,frontend
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**

# Backend (Node.js)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Frontend (Next.js)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Code Quality Gates
sonar.qualitygate.wait=true

# Security
sonar.javascript.node.sonarjs.security=true
sonar.security.hotspots.reviewed.percentage=80
